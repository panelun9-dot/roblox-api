<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Keys</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1f2937;
padding:40px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
font-size:42px;
margin-bottom:20px;
color:#22c55e;
}

p{
font-size:20px;
color:#d1d5db;
margin-bottom:20px;
}

button{
background:#22c55e;
color:white;
border:none;
padding:18px 35px;
font-size:20px;
border-radius:18px;
cursor:pointer;
margin:10px;
}

.copy{
background:#2563eb;
}

.key-box{
margin-top:30px;
padding:25px;
background:#0b0b12;
border-radius:20px;
border:2px solid #22c55e;
}

.key{
font-size:30px;
font-weight:bold;
color:#22c55e;
margin-bottom:15px;
}

.timer{
font-size:24px;
color:white;
}

.status{
margin-top:20px;
font-size:20px;
color:#facc15;
}
</style>
</head>
<body>

<div class="container">
<h1>Generador de Keys</h1>
<p>Crea keys válidas por 3 horas</p>

<button onclick="generarKey()">Generar Key</button>
<button class="copy" onclick="copiarKey()">Copiar</button>

<div class="key-box">
<div class="key" id="key">Sin key generada</div>
<div class="timer" id="timer">00:00:00</div>
<div class="status" id="status"></div>
</div>
</div>

<script>
let keyActual="";
let expiracion=0;

function generarKey(){
keyActual="ROBUX-"+Math.random().toString(36).substring(2,8).toUpperCase();
expiracion=Date.now()+(3*60*60*1000);

localStorage.setItem("robuxKey",keyActual);
localStorage.setItem("robuxExp",expiracion);

document.getElementById("key").innerText=keyActual;
document.getElementById("status").innerText="Key activa";
}

function copiarKey(){
if(keyActual===""){
alert("Primero genera una key");
return;
}

navigator.clipboard.writeText(keyActual);
alert("Key copiada");
}

setInterval(()=>{
const exp=localStorage.getItem("robuxExp");
if(!exp)return;

const restante=exp-Date.now();

if(restante<=0){
document.getElementById("timer").innerText="Expirada";
document.getElementById("status").innerText="La key ya no funciona";
return;
}

const h=Math.floor(restante/3600000);
const m=Math.floor((restante%3600000)/60000);
const s=Math.floor((restante%60000)/1000);

document.getElementById("timer").innerText=
`${h}h ${m}m ${s}s`;
},1000);
</script>

</body>
  </html>
