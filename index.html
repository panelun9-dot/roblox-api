<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regala Robux</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1f1f2e;
color:white;
text-align:center;
}

#keyScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0f;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.key-box{
background:#111827;
padding:35px;
border-radius:25px;
width:90%;
max-width:400px;
}

input,select,button{
width:90%;
padding:18px;
margin:10px 0;
border:none;
border-radius:18px;
font-size:20px;
}

input,select{
background:#444;
color:white;
}

button{
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.navbar{
background:black;
padding:18px;
font-size:28px;
font-weight:bold;
}

.balance{
margin:25px auto;
background:#0b0b12;
width:80%;
max-width:500px;
padding:20px;
border-radius:20px;
font-size:42px;
color:#22c55e;
font-weight:bold;
}

.hero{
padding:40px 20px;
}

.hero h1{
font-size:65px;
}

.hero p{
color:#9ca3af;
font-size:22px;
margin:20px 0;
}

.search-box{
background:#050510;
padding:35px;
border-radius:30px;
width:90%;
max-width:650px;
margin:auto;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:25px;
margin-top:25px;
}

.card img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
}

.error{
background:#7f1d1d;
padding:18px;
border-radius:20px;
margin-top:20px;
}
</style>
</head>

<body>

<div id="keyScreen">
<div class="key-box">
<h1>Acceso privado</h1>
<input type="password" id="keyInput" placeholder="Escribe la key">
<button onclick="verificarKey()">Entrar</button>
<p id="errorKey"></p>
</div>
</div>

<div class="navbar">Roblox</div>
<div class="balance" id="misRobux">1,000,000</div>

<section class="hero">
<h1>Regala Robux</h1>
<p>¡Envía hasta un 25% más de Robux!</p>

<div class="search-box">
<input id="username" placeholder="Usuario Roblox">

<select id="robux">
<option>100</option>
<option>500</option>
<option>1000</option>
<option>10000</option>
<option>50000</option>
</select>

<button onclick="buscarUsuario()">Buscar</button>

<div id="resultado"></div>
</div>
</section>

<script>
function verificarKey(){
const key=document.getElementById("keyInput").value;

if(key==="VICTOR9009"){
document.getElementById("keyScreen").style.display="none";
}else{
document.getElementById("errorKey").innerText="Key incorrecta";
}
}

async function buscarUsuario(){
const usuario=document.getElementById("username").value.trim();
const robux=document.getElementById("robux").value;
const resultado=document.getElementById("resultado");

if(usuario===""){
resultado.innerHTML='<div class="error">Escribe un usuario</div>';
return;
}

resultado.innerHTML='<div class="error">Buscando...</div>';

try{
const res=await fetch(
"https://corsproxy.io/?https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usernames:[usuario],
excludeBannedUsers:false
})
}
);

const data=await res.json();

if(!data.data || !data.data.length){
resultado.innerHTML='<div class="error">Usuario no encontrado</div>';
return;
}

const user=data.data[0];

const avatar=`https://www.roblox.com/headshot-thumbnail/image?userId=${user.id}&width=420&height=420&format=png`;

resultado.innerHTML=`
<div class="card">
<img src="${avatar}">
<h2>${user.name}</h2>
<p>${user.displayName}</p>
<p>ID: ${user.id}</p>
<button onclick="donar('${user.name}',${robux})">
Donar ${robux}
</button>
</div>
`;

}catch(error){
resultado.innerHTML='<div class="error">Error buscando usuario</div>';
}
}

function donar(usuario,robux){
let balance=parseInt(
document.getElementById("misRobux").innerText.replace(/,/g,'')
);

if(balance<robux){
alert("No tienes suficientes Robux");
return;
}

balance-=robux;
document.getElementById("misRobux").innerText=balance.toLocaleString();

document.getElementById("resultado").innerHTML=`
<div class="card">
<h2>¡Donación enviada!</h2>
<p>${robux} Robux enviados a ${usuario}</p>
<button onclick="location.reload()">Volver</button>
</div>
`;
}
</script>

</body>
</html>
