<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regala Robux</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
text-align:center;
}

/* pantalla key */
#keyScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.key-box{
background:#1f2937;
padding:30px;
border-radius:25px;
width:90%;
max-width:450px;
}

input,select,button{
width:90%;
padding:18px;
margin:10px;
border:none;
border-radius:18px;
font-size:18px;
}

input,select{
background:#374151;
color:white;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

/* barra estilo roblox */
.topbar{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:40px;
color:black;
font-weight:bold;
transform:rotate(15deg);
}

.registro{
background:#2563eb;
color:white;
width:auto;
padding:14px 25px;
border-radius:18px;
}

.login{
background:white;
color:#666;
border:2px solid #999;
width:auto;
padding:14px 25px;
border-radius:18px;
}

.search{
font-size:35px;
color:#666;
}

.balance{
font-size:42px;
color:#22c55e;
margin:25px;
font-weight:bold;
background:#0b0b12;
padding:20px;
border-radius:20px;
width:80%;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.hero{
padding:40px 20px;
}

.hero h1{
font-size:60px;
}

.hero p{
color:#9ca3af;
font-size:22px;
margin:20px 0;
}

.search-box,.card{
background:#1f2937;
padding:30px;
border-radius:25px;
width:90%;
max-width:550px;
margin:auto;
margin-top:20px;
}

.card img{
width:140px;
height:140px;
border-radius:50%;
}

.loader{
width:50px;
height:50px;
border:5px solid #333;
border-top:5px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.success{
color:#22c55e;
font-size:28px;
font-weight:bold;
}
</style>
</head>
<body>

<div id="keyScreen">
<div class="key-box">
<h1>Acceso Privado</h1>
<input type="password" id="keyInput" placeholder="Escribe la key">
<button onclick="verificarKey()">Entrar</button>
<p id="errorKey"></p>
</div>
</div>

<div class="topbar">
<div class="logo">◼</div>
<button class="registro">Registro</button>
<button class="login">Iniciar sesión</button>
<div class="search">⌕</div>
</div>

<div class="balance" id="misRobux">1,000,000</div>

<section class="hero">
<h1>Regala Robux</h1>
<p>¡Envía hasta un 25% más de Robux a amigos y familiares!</p>

<div class="search-box">
<input id="username" placeholder="Usuario Roblox">

<select id="robux">
<option>100</option>
<option>500</option>
<option>1000</option>
<option>10000</option>
<option>50000</option>
</select>

<button onclick="buscarUsuario()">Buscar</button>

<div id="resultado"></div>
</div>
</section>

<script>
function verificarKey(){
const key=document.getElementById("keyInput").value;

if(key==="VICTOR9009"){
document.getElementById("keyScreen").style.display="none";
}else{
document.getElementById("errorKey").innerText="Key incorrecta";
}
}

function buscarUsuario(){
const usuario=document.getElementById("username").value.trim();
const robux=document.getElementById("robux").value;
const resultado=document.getElementById("resultado");

if(usuario===""){
resultado.innerHTML="<p>Escribe usuario</p>";
return;
}

resultado.innerHTML='<div class="loader"></div><p>Buscando usuario...</p>';

setTimeout(()=>{
const avatar=`https://robohash.org/${usuario}.png?size=200x200`;

resultado.innerHTML=`
<div class="card">
<img src="${avatar}">
<h2>${usuario}</h2>
<p>ID: ${Math.floor(Math.random()*99999999)}</p>
<button onclick="donar('${usuario}',${robux})">
Donar ${robux}
</button>
</div>
`;
},2000);
}

function donar(usuario,robux){
const resultado=document.getElementById("resultado");

resultado.innerHTML='<div class="loader"></div><p>Procesando donación...</p>';

setTimeout(()=>{
let balance=parseInt(
document.getElementById("misRobux").innerText.replace(/,/g,'')
);

balance-=robux;

document.getElementById("misRobux").innerText=balance.toLocaleString();

resultado.innerHTML=`
<div class="card">
<h2 class="success">Donación completada</h2>
<p>${robux} Robux enviados a ${usuario}</p>
<button onclick="location.reload()">Volver</button>
</div>
`;
},3000);
}
</script>

</body>
</html>
